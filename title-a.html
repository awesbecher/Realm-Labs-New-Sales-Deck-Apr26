<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Realm Labs — Title Option A: Dark Cinematic</title>
    <link
      rel="preload"
      as="font"
      type="font/otf"
      href="assets/fonts/Rebond-Regular.otf"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/otf"
      href="assets/fonts/Rebond-Semibold.otf"
      crossorigin
    />
    <link rel="preload" as="font" type="font/otf" href="assets/fonts/Rebond-Bold.otf" crossorigin />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="assets/fonts/Satoshi-Regular.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="assets/fonts/Satoshi-Italic.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/otf"
      href="assets/fonts/GeistMono-Regular.otf"
      crossorigin
    />
    <style>
      @font-face {
        font-family: 'Rebond Grotesque';
        src: url('assets/fonts/Rebond-Regular.otf') format('opentype');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Rebond Grotesque';
        src: url('assets/fonts/Rebond-Semibold.otf') format('opentype');
        font-weight: 600;
        font-display: swap;
      }
      @font-face {
        font-family: 'Rebond Grotesque';
        src: url('assets/fonts/Rebond-Bold.otf') format('opentype');
        font-weight: 700;
        font-display: swap;
      }
      @font-face {
        font-family: 'Satoshi';
        src: url('assets/fonts/Satoshi-Regular.woff2') format('woff2');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Satoshi';
        src: url('assets/fonts/Satoshi-Italic.woff2') format('woff2');
        font-weight: 400;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: 'Geist Mono';
        src: url('assets/fonts/GeistMono-Regular.otf') format('opentype');
        font-weight: 400;
        font-display: swap;
      }

      :root {
        --purple: #400ebe;
        --purple-2: #6a3fe8;
        --teal: #11d677;
        --teal-dark: #00925c;
        --navy: #0a0f1c;
        --white: #ffffff;
        --ink: #0d0a1f;
        --body: #4a4562;
        --muted: #a2a7b2;
        --font-head: 'Rebond Grotesque', 'Space Grotesk', system-ui, sans-serif;
        --font-body: 'Satoshi', 'Inter', system-ui, sans-serif;
        --font-mono: 'Geist Mono', ui-monospace, monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050508;
      }

      .deck {
        position: relative;
        aspect-ratio: 16 / 9;
        width: 100vw;
        max-width: 100vw;
        max-height: 100vh;
        overflow: hidden;
      }

      .slide {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        padding: clamp(32px, 4vw, 72px) clamp(40px, 5vw, 96px);
        color: var(--white);
        background: radial-gradient(ellipse at 82% 8%, rgba(106, 63, 232, 0.32) 0%, transparent 48%),
          radial-gradient(ellipse at 6% 92%, rgba(17, 214, 119, 0.14) 0%, transparent 52%),
          var(--navy);
        box-shadow: inset 0 0 160px 40px rgba(0, 0, 0, 0.55);
        overflow: hidden;
      }

      .slide::before,
      .slide::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        pointer-events: none;
        opacity: 0.5;
        z-index: 0;
      }
      .slide::before {
        width: 680px;
        height: 680px;
        background: radial-gradient(circle, var(--purple) 0%, transparent 70%);
        top: -220px;
        left: -200px;
      }
      .slide::after {
        width: 780px;
        height: 780px;
        background: radial-gradient(circle, var(--teal) 0%, transparent 70%);
        bottom: -260px;
        right: -240px;
      }

      .brand-mark {
        position: absolute;
        top: clamp(28px, 3.5vh, 40px);
        left: clamp(44px, 5vw, 64px);
        opacity: 0.9;
        z-index: 4;
      }
      .brand-mark img {
        height: 22px;
      }

      .footer-copy,
      .slide-number {
        position: absolute;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.14em;
        color: rgba(255, 255, 255, 0.55);
        z-index: 4;
      }
      .footer-copy {
        bottom: clamp(22px, 2.8vh, 32px);
        left: clamp(44px, 5vw, 64px);
        text-transform: uppercase;
      }
      .slide-number {
        bottom: clamp(22px, 2.8vh, 32px);
        right: clamp(44px, 5vw, 64px);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 999px;
        font-family: var(--font-head);
        font-weight: 600;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        background: rgba(17, 214, 119, 0.14);
        color: var(--teal);
        border: 1px solid rgba(17, 214, 119, 0.35);
      }
      .pill::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 10px currentColor;
      }

      .copy {
        position: absolute;
        left: clamp(44px, 5vw, 96px);
        top: 50%;
        transform: translateY(-50%);
        z-index: 3;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 22px;
        width: 52%;
        max-width: 820px;
      }

      .copy h1 {
        font-family: var(--font-head);
        font-weight: 700;
        font-size: clamp(2.6rem, 6.6vw, 5.6rem);
        line-height: 0.98;
        letter-spacing: -0.025em;
        color: var(--white);
      }
      .copy h1 em {
        font-style: italic;
        font-weight: 600;
        background: linear-gradient(120deg, #34f1a6 0%, var(--teal) 35%, var(--purple-2) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 24px rgba(17, 214, 119, 0.35));
      }

      .tagline {
        font-family: var(--font-body);
        font-weight: 400;
        font-size: clamp(1.05rem, 1.5vw, 1.35rem);
        color: rgba(255, 255, 255, 0.72);
        max-width: 44ch;
        letter-spacing: 0.005em;
      }

      .hero-wrap {
        position: absolute;
        top: 50%;
        right: -3%;
        transform: translateY(-50%);
        width: 52%;
        height: 96%;
        z-index: 2;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .hero-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        -webkit-mask-image: radial-gradient(ellipse 65% 60% at 52% 50%, black 48%, transparent 88%);
        mask-image: radial-gradient(ellipse 65% 60% at 52% 50%, black 48%, transparent 88%);
        filter: drop-shadow(0 24px 60px rgba(106, 63, 232, 0.38))
          drop-shadow(0 8px 32px rgba(17, 214, 119, 0.2));
      }

      .variant-tag {
        position: absolute;
        top: clamp(28px, 3.5vh, 40px);
        right: clamp(44px, 5vw, 64px);
        z-index: 5;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.32);
        padding: 6px 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="deck">
      <section class="slide">
        <div class="brand-mark"><img src="assets/logo-light.svg" alt="Realm Labs" /></div>
        <div class="variant-tag">Option A · Dark Cinematic</div>

        <div class="copy">
          <span class="pill">RSAC 2026 · Innovation Sandbox Finalist</span>
          <h1>Ship AI<br />your customers <em>trust</em>.</h1>
          <p class="tagline">Runtime AI Security &amp; Observability.</p>
        </div>

        <div class="hero-wrap">
          <img src="assets/hero-viz-v3.png" alt="Realm Labs runtime visualization" />
        </div>

        <span class="footer-copy">© 2026 Realm Labs, Inc. · Confidential</span>
        <span class="slide-number">01 / 15</span>
      </section>
    </div>
  </body>
</html>
