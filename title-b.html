<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Realm Labs — Title Option B: Light Editorial</title>
    <link
      rel="preload"
      as="font"
      type="font/otf"
      href="assets/fonts/Rebond-Regular.otf"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/otf"
      href="assets/fonts/Rebond-Semibold.otf"
      crossorigin
    />
    <link rel="preload" as="font" type="font/otf" href="assets/fonts/Rebond-Bold.otf" crossorigin />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="assets/fonts/Satoshi-Regular.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="assets/fonts/Satoshi-Italic.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/otf"
      href="assets/fonts/GeistMono-Regular.otf"
      crossorigin
    />
    <style>
      @font-face {
        font-family: 'Rebond Grotesque';
        src: url('assets/fonts/Rebond-Regular.otf') format('opentype');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Rebond Grotesque';
        src: url('assets/fonts/Rebond-Semibold.otf') format('opentype');
        font-weight: 600;
        font-display: swap;
      }
      @font-face {
        font-family: 'Rebond Grotesque';
        src: url('assets/fonts/Rebond-Bold.otf') format('opentype');
        font-weight: 700;
        font-display: swap;
      }
      @font-face {
        font-family: 'Satoshi';
        src: url('assets/fonts/Satoshi-Regular.woff2') format('woff2');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Satoshi';
        src: url('assets/fonts/Satoshi-Italic.woff2') format('woff2');
        font-weight: 400;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: 'Geist Mono';
        src: url('assets/fonts/GeistMono-Regular.otf') format('opentype');
        font-weight: 400;
        font-display: swap;
      }

      :root {
        --purple: #400ebe;
        --purple-2: #6a3fe8;
        --teal: #11d677;
        --teal-dark: #00925c;
        --white: #ffffff;
        --cream: #f7f4ee;
        --ink: #0d0a1f;
        --ink-2: #2a2440;
        --body: #4a4562;
        --muted: #a2a7b2;
        --border-l: #e6e4ee;
        --font-head: 'Rebond Grotesque', 'Space Grotesk', system-ui, sans-serif;
        --font-body: 'Satoshi', 'Inter', system-ui, sans-serif;
        --font-mono: 'Geist Mono', ui-monospace, monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0c;
      }

      .deck {
        position: relative;
        aspect-ratio: 16 / 9;
        width: 100vw;
        max-width: 100vw;
        max-height: 100vh;
        overflow: hidden;
      }

      .slide {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        padding: clamp(32px, 4vw, 72px) clamp(40px, 5vw, 96px);
        color: var(--ink);
        background: radial-gradient(ellipse at 12% 8%, rgba(64, 14, 190, 0.09) 0%, transparent 46%),
          radial-gradient(ellipse at 92% 92%, rgba(17, 214, 119, 0.07) 0%, transparent 48%),
          linear-gradient(180deg, var(--cream) 0%, #fbf9f5 52%, var(--cream) 100%);
        overflow: hidden;
      }

      .brand-mark {
        position: absolute;
        top: clamp(28px, 3.5vh, 40px);
        left: clamp(44px, 5vw, 64px);
        opacity: 0.95;
        z-index: 4;
      }
      .brand-mark img {
        height: 22px;
      }

      .footer-copy,
      .slide-number {
        position: absolute;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.14em;
        color: var(--muted);
        z-index: 4;
      }
      .footer-copy {
        bottom: clamp(22px, 2.8vh, 32px);
        left: clamp(44px, 5vw, 64px);
        text-transform: uppercase;
      }
      .slide-number {
        bottom: clamp(22px, 2.8vh, 32px);
        right: clamp(44px, 5vw, 64px);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 16px;
        border-radius: 999px;
        font-family: var(--font-mono);
        font-weight: 500;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        background: rgba(64, 14, 190, 0.05);
        color: var(--purple);
        border: 1px solid rgba(64, 14, 190, 0.2);
      }
      .pill::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--teal);
      }

      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(18px, 2.2vh, 26px);
        padding: clamp(72px, 9vh, 120px) clamp(40px, 5vw, 96px);
        z-index: 2;
      }

      .hero-wrap {
        width: clamp(320px, 38%, 560px);
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }
      .hero-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        -webkit-mask-image: radial-gradient(ellipse 62% 58% at 50% 50%, black 48%, transparent 88%);
        mask-image: radial-gradient(ellipse 62% 58% at 50% 50%, black 48%, transparent 88%);
        filter: drop-shadow(0 22px 44px rgba(64, 14, 190, 0.18))
          drop-shadow(0 8px 22px rgba(17, 214, 119, 0.12));
      }

      .copy {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 14px;
        max-width: 920px;
      }

      .copy h1 {
        font-family: var(--font-head);
        font-weight: 700;
        font-size: clamp(2.4rem, 5vw, 4.2rem);
        line-height: 1.02;
        letter-spacing: -0.025em;
        color: var(--ink);
      }
      .copy h1 em {
        font-style: italic;
        font-weight: 600;
        background: linear-gradient(120deg, var(--teal-dark) 0%, var(--purple) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .tagline {
        font-family: var(--font-body);
        font-weight: 400;
        font-size: clamp(1rem, 1.35vw, 1.2rem);
        color: var(--body);
        letter-spacing: 0.005em;
      }

      .divider {
        width: 44px;
        height: 2px;
        background: linear-gradient(90deg, var(--teal) 0%, var(--purple) 100%);
        border-radius: 2px;
        margin: 4px 0 6px;
        opacity: 0.8;
      }

      .variant-tag {
        position: absolute;
        top: clamp(28px, 3.5vh, 40px);
        right: clamp(44px, 5vw, 64px);
        z-index: 5;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 6px 10px;
        border: 1px solid var(--border-l);
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="deck">
      <section class="slide">
        <div class="brand-mark"><img src="assets/logo-dark.svg" alt="Realm Labs" /></div>
        <div class="variant-tag">Option B · Light Editorial</div>

        <div class="stage">
          <span class="pill">RSAC 2026 · Innovation Sandbox Finalist</span>

          <div class="hero-wrap">
            <img src="assets/hero-viz-v3.png" alt="Realm Labs runtime visualization" />
          </div>

          <div class="copy">
            <h1>Ship AI your customers <em>trust</em>.</h1>
            <div class="divider"></div>
            <p class="tagline">Runtime AI Security &amp; Observability.</p>
          </div>
        </div>

        <span class="footer-copy">© 2026 Realm Labs, Inc. · Confidential</span>
        <span class="slide-number">01 / 15</span>
      </section>
    </div>
  </body>
</html>
