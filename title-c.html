<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Realm Labs — Title Option C: Full-Bleed Hero</title>
    <link
      rel="preload"
      as="font"
      type="font/otf"
      href="assets/fonts/Rebond-Regular.otf"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/otf"
      href="assets/fonts/Rebond-Semibold.otf"
      crossorigin
    />
    <link rel="preload" as="font" type="font/otf" href="assets/fonts/Rebond-Bold.otf" crossorigin />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="assets/fonts/Satoshi-Regular.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="assets/fonts/Satoshi-Italic.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/otf"
      href="assets/fonts/GeistMono-Regular.otf"
      crossorigin
    />
    <style>
      @font-face {
        font-family: 'Rebond Grotesque';
        src: url('assets/fonts/Rebond-Regular.otf') format('opentype');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Rebond Grotesque';
        src: url('assets/fonts/Rebond-Semibold.otf') format('opentype');
        font-weight: 600;
        font-display: swap;
      }
      @font-face {
        font-family: 'Rebond Grotesque';
        src: url('assets/fonts/Rebond-Bold.otf') format('opentype');
        font-weight: 700;
        font-display: swap;
      }
      @font-face {
        font-family: 'Satoshi';
        src: url('assets/fonts/Satoshi-Regular.woff2') format('woff2');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Satoshi';
        src: url('assets/fonts/Satoshi-Italic.woff2') format('woff2');
        font-weight: 400;
        font-style: italic;
        font-display: swap;
      }
      @font-face {
        font-family: 'Geist Mono';
        src: url('assets/fonts/GeistMono-Regular.otf') format('opentype');
        font-weight: 400;
        font-display: swap;
      }

      :root {
        --purple: #400ebe;
        --purple-2: #6a3fe8;
        --teal: #11d677;
        --teal-dark: #00925c;
        --navy: #0a0f1c;
        --white: #ffffff;
        --ink: #0d0a1f;
        --body: #4a4562;
        --muted: #a2a7b2;
        --font-head: 'Rebond Grotesque', 'Space Grotesk', system-ui, sans-serif;
        --font-body: 'Satoshi', 'Inter', system-ui, sans-serif;
        --font-mono: 'Geist Mono', ui-monospace, monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050508;
      }

      .deck {
        position: relative;
        aspect-ratio: 16 / 9;
        width: 100vw;
        max-width: 100vw;
        max-height: 100vh;
        overflow: hidden;
      }

      .slide {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        color: var(--white);
        background: #060912;
        overflow: hidden;
      }

      /* Hero fills the whole slide as the visual backdrop */
      .hero-wrap {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: flex-end;
      }
      .hero-wrap img {
        width: 78%;
        height: 110%;
        object-fit: cover;
        object-position: 42% center;
        transform: translate(6%, 0);
        -webkit-mask-image: radial-gradient(ellipse 80% 70% at 60% 50%, black 60%, transparent 100%),
          linear-gradient(90deg, transparent 0%, black 22%, black 100%);
        -webkit-mask-composite: source-in;
        mask-image: radial-gradient(ellipse 80% 70% at 60% 50%, black 60%, transparent 100%),
          linear-gradient(90deg, transparent 0%, black 22%, black 100%);
        mask-composite: intersect;
        filter: saturate(1.08) contrast(1.03);
      }

      /* Dark scrim overlay on the left to make copy pop */
      .scrim {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background: linear-gradient(
            90deg,
            rgba(6, 9, 18, 0.96) 0%,
            rgba(6, 9, 18, 0.82) 28%,
            rgba(6, 9, 18, 0.4) 52%,
            rgba(6, 9, 18, 0.05) 72%,
            rgba(6, 9, 18, 0) 100%
          ),
          radial-gradient(ellipse at 8% 110%, rgba(17, 214, 119, 0.16) 0%, transparent 46%),
          radial-gradient(ellipse at 2% 0%, rgba(64, 14, 190, 0.22) 0%, transparent 44%);
      }

      .brand-mark {
        position: absolute;
        top: clamp(28px, 3.5vh, 40px);
        left: clamp(44px, 5vw, 64px);
        opacity: 0.95;
        z-index: 5;
      }
      .brand-mark img {
        height: 22px;
      }

      .footer-copy,
      .slide-number {
        position: absolute;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.14em;
        color: rgba(255, 255, 255, 0.6);
        z-index: 5;
      }
      .footer-copy {
        bottom: clamp(22px, 2.8vh, 32px);
        left: clamp(44px, 5vw, 64px);
        text-transform: uppercase;
      }
      .slide-number {
        bottom: clamp(22px, 2.8vh, 32px);
        right: clamp(44px, 5vw, 64px);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 14px;
        border-radius: 999px;
        font-family: var(--font-head);
        font-weight: 600;
        font-size: 0.75rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        background: rgba(17, 214, 119, 0.12);
        color: var(--teal);
        border: 1px solid rgba(17, 214, 119, 0.34);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      .pill::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 10px currentColor;
      }

      .copy {
        position: absolute;
        left: clamp(44px, 5vw, 96px);
        top: 50%;
        transform: translateY(-50%);
        z-index: 4;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 22px;
        width: 46%;
        max-width: 720px;
      }

      .copy h1 {
        font-family: var(--font-head);
        font-weight: 700;
        font-size: clamp(2.4rem, 5.6vw, 4.9rem);
        line-height: 1;
        letter-spacing: -0.025em;
        color: var(--white);
      }
      .copy h1 em {
        font-style: italic;
        font-weight: 600;
        background: linear-gradient(120deg, #34f1a6 0%, var(--teal) 40%, var(--purple-2) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 18px rgba(17, 214, 119, 0.32));
      }

      .tagline {
        font-family: var(--font-body);
        font-weight: 400;
        font-size: clamp(1rem, 1.4vw, 1.25rem);
        color: rgba(255, 255, 255, 0.78);
        max-width: 40ch;
      }

      .rule {
        width: 72px;
        height: 2px;
        background: linear-gradient(90deg, var(--teal) 0%, var(--purple-2) 100%);
        border-radius: 2px;
        margin-top: 4px;
        opacity: 0.85;
      }

      .variant-tag {
        position: absolute;
        top: clamp(28px, 3.5vh, 40px);
        right: clamp(44px, 5vw, 64px);
        z-index: 6;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.42);
        padding: 6px 10px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 6px;
        background: rgba(6, 9, 18, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <div class="deck">
      <section class="slide">
        <div class="hero-wrap">
          <img src="assets/hero-viz-v3.png" alt="Realm Labs runtime visualization" />
        </div>
        <div class="scrim"></div>

        <div class="brand-mark"><img src="assets/logo-light.svg" alt="Realm Labs" /></div>
        <div class="variant-tag">Option C · Full-Bleed Hero</div>

        <div class="copy">
          <span class="pill">RSAC 2026 · Innovation Sandbox Finalist</span>
          <h1>Ship AI<br />your customers <em>trust</em>.</h1>
          <div class="rule"></div>
          <p class="tagline">Runtime AI Security &amp; Observability.</p>
        </div>

        <span class="footer-copy">© 2026 Realm Labs, Inc. · Confidential</span>
        <span class="slide-number">01 / 15</span>
      </section>
    </div>
  </body>
</html>
